<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>ガチャゲーム</title>
<style>
body{
  font-family: Arial, sans-serif;
  text-align:center;
  background:linear-gradient(180deg,#141e30,#243b55);
  height:100vh;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

#game{
  background:rgba(0,0,0,0.6);
  padding:30px;
  border-radius:20px;
  width:420px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

h1{margin-top:0}

.buttons{
  display:flex;
  gap:10px;
  justify-content:center;
}

button{
  font-size:16px;
  padding:10px 18px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#ff9800,#ff5722);
  color:white;
  cursor:pointer;
  transition:transform .2s;
}

button:hover{transform:scale(1.05)}

#result{
  margin-top:20px;
  min-height:200px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.card{
  padding:10px;
  border-radius:12px;
  font-size:14px;
  font-weight:bold;
  animation:pop .4s ease;
}

.card img{
  width:100%;
  height:90px;
  object-fit:cover;
  border-radius:8px;
}

@keyframes pop{
  0%{transform:scale(0);opacity:0}
  70%{transform:scale(1.15)}
  100%{transform:scale(1);opacity:1}
}

.N{background:#9e9e9e}
.R{background:#42a5f5}
.SR{background:#ab47bc}
.SSR{
  background:linear-gradient(45deg,#ffd700,#ff9800);
  animation:ssrGlow 1s infinite alternate;
}

@keyframes ssrGlow{
  from{box-shadow:0 0 8px gold}
  to{box-shadow:0 0 20px gold}
}

#gachaBall{
  width:80px;
  height:80px;
  border-radius:50%;
  background:linear-gradient(red 50%,white 50%);
  margin:20px auto;
  position:relative;
  display:none;
  animation:shake .6s infinite;
}

#gachaBall:after{
  content:"";
  position:absolute;
  width:20px;
  height:20px;
  background:white;
  border-radius:50%;
  top:30px;
  left:30px;
  border:3px solid #333;
}

@keyframes shake{
  0%{transform:rotate(-10deg)}
  50%{transform:rotate(10deg)}
  100%{transform:rotate(-10deg)}
}

.flash{animation:flash .4s 3}

@keyframes flash{
  0%{background:white}
  100%{background:transparent}
}

</style>
</head>
<body>

<div id="game">
<h1>ガチャゲーム</h1>

<div class="buttons">
<button onclick="drawGacha(1)">1回ガチャ</button>
<button onclick="drawGacha(10)">10連ガチャ</button>
</div>

<div id="gachaBall"></div>
<div id="result"></div>
</div>

<script>
const characters = [
{name:"スライム",rarity:"N",rate:60,img:"https://picsum.photos/seed/slime/200"},
{name:"ゴブリン",rarity:"N",rate:60,img:"https://picsum.photos/seed/goblin/200"},
{name:"ナイト",rarity:"R",rate:25,img:"https://picsum.photos/seed/knight/200"},
{name:"ウィザード",rarity:"R",rate:25,img:"https://picsum.photos/seed/wizard/200"},
{name:"ドラゴン",rarity:"SR",rate:10,img:"https://picsum.photos/seed/dragon/200"},
{name:"フェニックス",rarity:"SSR",rate:3,img:"https://picsum.photos/seed/phoenix/200"}
];

function pickCharacter(){
 const total = characters.reduce((s,c)=>s+c.rate,0);
 let rand = Math.random()*total;

 for(const c of characters){
   if(rand < c.rate) return c;
   rand -= c.rate;
 }
 return characters[0];
}

function drawGacha(count){
 const resultDiv=document.getElementById("result");
 const ball=document.getElementById("gachaBall");

 resultDiv.innerHTML="";
 ball.style.display="block";

 setTimeout(()=>{

 ball.style.display="none";

 let ssrHit=false;

 for(let i=0;i<count;i++){
   const chosen=pickCharacter();

   if(chosen.rarity==="SSR") ssrHit=true;

   const card=document.createElement("div");
   card.className="card "+chosen.rarity;

   card.innerHTML=`
     <img src="${chosen.img}">
     <div>${chosen.rarity}</div>
     <div>${chosen.name}</div>
   `;

   resultDiv.appendChild(card);
 }

 if(ssrHit){
   document.body.classList.add("flash");
   setTimeout(()=>document.body.classList.remove("flash"),1200);
 }

 },1500);
}
</script>

</body>
</html>
