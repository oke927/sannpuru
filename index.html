<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>イラストタップRPG</title>

<style>

body{
font-family:sans-serif;
text-align:center;
margin:0;
background:linear-gradient(#111,#000);
color:white;
}

h1{
margin-top:10px;
}

#enemy{
width:150px;
cursor:pointer;
transition:transform 0.1s;
}

#enemy:active{
transform:scale(0.9);
}

#effect{
font-size:35px;
color:yellow;
height:40px;
}

#hpbar{
width:80%;
height:20px;
background:#444;
margin:10px auto;
border-radius:10px;
overflow:hidden;
}

#hp{
height:100%;
width:100%;
background:red;
}

button{
font-size:14px;
padding:8px 16px;
margin:4px;
border:none;
border-radius:10px;
background:orange;
color:white;
}

</style>
</head>

<body>

<h1>⚔️イラストタップRPG</h1>

<div id="stage"></div>

<img id="enemy" src="https://i.imgur.com/8QfQZ6F.png">

<div id="effect"></div>

<div id="hpbar">
<div id="hp"></div>
</div>

<div id="enemyhp"></div>

<div id="coins"></div>
<div id="weapon"></div>
<div id="ally"></div>

<button onclick="upgradeWeapon()">武器強化</button>
<button onclick="hireAlly()">仲間</button>
<button onclick="skill()">必殺技</button>

<script>

let coins = 0
let weapon = 1
let ally = 0
let stage = 1

let hp
let maxHP

const enemies=[
{img:"https://i.imgur.com/8QfQZ6F.png",hp:40},
{img:"https://i.imgur.com/BK8QK6F.png",hp:50},
{img:"https://i.imgur.com/0Z8FQ9T.png",hp:60}
]

spawnEnemy()
updateUI()

document.getElementById("enemy").onclick=function(){
attack(weapon)
}

function attack(power){

hp -= power

document.getElementById("effect").innerText="💥-"+power

setTimeout(()=>{
document.getElementById("effect").innerText=""
},300)

if(hp<=0){

coins += 10

stage++

spawnEnemy()

}

updateHP()

}

function spawnEnemy(){

let enemy=enemies[Math.floor(Math.random()*enemies.length)]

maxHP=enemy.hp+stage*5
hp=maxHP

document.getElementById("enemy").src=enemy.img

updateHP()

}

function updateHP(){

document.getElementById("enemyhp").innerText="HP:"+hp

let percent=(hp/maxHP)*100

document.getElementById("hp").style.width=percent+"%"

updateUI()

}

function updateUI(){

document.getElementById("coins").innerText="コイン:"+coins
document.getElementById("weapon").innerText="武器Lv:"+weapon
document.getElementById("ally").innerText="仲間:"+ally
document.getElementById("stage").innerText="ステージ:"+stage

}

function upgradeWeapon(){

let cost=weapon*30

if(coins>=cost){

coins-=cost
weapon++

}else{

alert("コイン不足")

}

updateUI()

}

function hireAlly(){

if(coins>=100){

coins-=100
ally++

}else{

alert("コイン不足")

}

updateUI()

}

function skill(){

attack(weapon*8)

}

setInterval(()=>{

if(ally>0){

attack(ally)

}

},1000)

</script>

</body>
  </html>
