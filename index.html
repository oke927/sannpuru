<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>古文 助動詞カルタ（学習用）</title>

<style>
body{
font-family:sans-serif;
text-align:center;
background:#f6f6f6;
margin:0;
}

h1{
margin:10px;
}

#game{
max-width:700px;
margin:auto;
}

#question{
font-size:22px;
margin:15px;
padding:15px;
background:white;
border-radius:10px;
}

#cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:10px;
padding:20px;
font-size:20px;
cursor:pointer;
box-shadow:0 3px 6px rgba(0,0,0,0.2);
transition:0.2s;
}

.card:hover{
background:#ffeaa7;
transform:scale(1.05);
}

#info{
margin:10px;
font-size:16px;
background:white;
padding:10px;
border-radius:10px;
}

button{
font-size:18px;
padding:10px 20px;
margin:10px;
}

#score{
font-size:20px;
}
</style>
</head>

<body>

<h1>古文 助動詞カルタ</h1>

<div id="game">

<div id="score">スコア: 0</div>

<button onclick="startGame()">スタート</button>

<div id="question">
スタートを押すと助動詞の意味が読み上げられます
</div>

<div id="cards"></div>

<div id="info"></div>

</div>

<script>

const data = [

{aux:"る",meaning:"受身・可能・自発・尊敬",connect:"未然形接続"},
{aux:"らる",meaning:"受身・可能・自発・尊敬",connect:"未然形接続"},
{aux:"む",meaning:"推量・意志",connect:"未然形接続"},
{aux:"けり",meaning:"過去・詠嘆",connect:"連用形接続"},
{aux:"たり",meaning:"完了・存続",connect:"連用形接続"},
{aux:"ぬ",meaning:"完了・強意",connect:"連用形接続"},
{aux:"べし",meaning:"推量・当然・可能・命令",connect:"終止形接続"},
{aux:"まじ",meaning:"打消推量",connect:"終止形接続"},
{aux:"ず",meaning:"打消",connect:"未然形接続"},
{aux:"き",meaning:"過去",connect:"連用形接続"},
{aux:"らむ",meaning:"現在推量",connect:"終止形接続"},
{aux:"なり",meaning:"伝聞・推定",connect:"終止形接続"}

];

let score=0;
let current;

function speak(text){
const u = new SpeechSynthesisUtterance(text);
u.lang="ja-JP";
speechSynthesis.speak(u);
}

function startGame(){
score=0;
document.getElementById("score").textContent="スコア: "+score;
nextQuestion();
}

function nextQuestion(){

document.getElementById("info").textContent="";

const cardsDiv=document.getElementById("cards");
cardsDiv.innerHTML="";

const shuffled=[...data].sort(()=>Math.random()-0.5).slice(0,8);

current=shuffled[Math.floor(Math.random()*shuffled.length)];

document.getElementById("question").textContent=
"この意味の助動詞はどれ？";

speak(current.meaning);

shuffled.forEach(d=>{

const card=document.createElement("div");
card.className="card";
card.textContent=d.aux;

card.onclick=()=>{

if(d.aux===current.aux){

score++;
document.getElementById("info").innerHTML=
"⭕ 正解！<br>"+
"助動詞："+current.aux+"<br>"+
"意味："+current.meaning+"<br>"+
"接続："+current.connect;

}else{

document.getElementById("info").innerHTML=
"❌ 不正解<br>"+
"正解："+current.aux+"<br>"+
"意味："+current.meaning+"<br>"+
"接続："+current.connect;

}

document.getElementById("score").textContent="スコア: "+score;

setTimeout(nextQuestion,2000);

};

cardsDiv.appendChild(card);

});

}

</script>

</body>
</html>
