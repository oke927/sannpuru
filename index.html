<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>古文 助動詞カルタ 学習ゲーム</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#f2f2f2;
margin:0;
}

h1{
margin:10px;
}

#menu{
margin:10px;
}

button{
font-size:16px;
padding:10px 20px;
margin:5px;
}

#game{
max-width:800px;
margin:auto;
}

#question{
font-size:22px;
background:white;
padding:15px;
border-radius:10px;
margin:10px;
}

#cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:10px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
font-size:20px;
cursor:pointer;
box-shadow:0 3px 6px rgba(0,0,0,0.2);
}

.card:hover{
background:#ffeaa7;
}

#info,#result,#dictionary{
background:white;
margin:10px;
padding:10px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ccc;
padding:5px;
}

</style>

</head>
<body>

<h1>古文 助動詞カルタ</h1>

<div id="menu">

<button onclick="startGame()">通常テスト</button>
<button onclick="startWeakMode()">苦手特訓</button>
<button onclick="showDictionary()">助動詞図鑑</button>
<button onclick="resetData()">記録リセット</button>

</div>

<div id="game">

<div id="question">モードを選んでください</div>

<div id="cards"></div>

<div id="info"></div>

<div id="result"></div>

<div id="dictionary"></div>

</div>

<script>

const data=[

{aux:"る",meaning:"受身・可能・自発・尊敬",connect:"未然形"},
{aux:"らる",meaning:"受身・可能・自発・尊敬",connect:"未然形"},
{aux:"す",meaning:"使役",connect:"未然形"},
{aux:"さす",meaning:"使役",connect:"未然形"},
{aux:"しむ",meaning:"使役・尊敬",connect:"未然形"},
{aux:"む",meaning:"推量・意志",connect:"未然形"},
{aux:"じ",meaning:"打消推量",connect:"未然形"},
{aux:"まし",meaning:"反実仮想",connect:"未然形"},
{aux:"ず",meaning:"打消",connect:"未然形"},
{aux:"き",meaning:"過去",connect:"連用形"},
{aux:"けり",meaning:"過去・詠嘆",connect:"連用形"},
{aux:"つ",meaning:"完了・強意",connect:"連用形"},
{aux:"ぬ",meaning:"完了・強意",connect:"連用形"},
{aux:"たり",meaning:"完了・存続",connect:"連用形"},
{aux:"り",meaning:"完了・存続",connect:"サ変未然・四段已然"},
{aux:"たし",meaning:"希望",connect:"連用形"},
{aux:"べし",meaning:"推量・当然・可能・命令",connect:"終止形"},
{aux:"まじ",meaning:"打消推量",connect:"終止形"},
{aux:"らむ",meaning:"現在推量",connect:"終止形"},
{aux:"けむ",meaning:"過去推量",connect:"連用形"},
{aux:"めり",meaning:"推定",connect:"終止形"},
{aux:"なり",meaning:"伝聞・推定",connect:"終止形"},
{aux:"らし",meaning:"推定",connect:"終止形"},
{aux:"ごとし",meaning:"比況",connect:"連体形"}

]

let wrongCount=JSON.parse(localStorage.getItem("kobunWrong"))||{}
let totalCorrect=Number(localStorage.getItem("kobunCorrect"))||0
let totalQuestion=Number(localStorage.getItem("kobunQuestion"))||0

data.forEach(d=>{
if(!wrongCount[d.aux]) wrongCount[d.aux]=0
})

let score=0
let questionCount=0
let current
let mode="normal"

function speak(text){

const u=new SpeechSynthesisUtterance(text)
u.lang="ja-JP"
speechSynthesis.speak(u)

}

function startGame(){

mode="normal"
score=0
questionCount=0
document.getElementById("dictionary").innerHTML=""
nextQuestion()

}

function startWeakMode(){

mode="weak"
score=0
questionCount=0
document.getElementById("dictionary").innerHTML=""
nextQuestion()

}

function getQuestionPool(){

if(mode==="weak"){

let weak=data.filter(d=>wrongCount[d.aux]>0)

if(weak.length>0) return weak

}

return data

}

function nextQuestion(){

if(questionCount>=10){

showResult()
return

}

questionCount++

const pool=getQuestionPool()

const cardsDiv=document.getElementById("cards")
cardsDiv.innerHTML=""

const shuffled=[...pool].sort(()=>Math.random()-0.5).slice(0,8)

current=shuffled[Math.floor(Math.random()*shuffled.length)]

document.getElementById("question").textContent=
"問題 "+questionCount+"：この意味の助動詞は？"

speak(current.meaning)

shuffled.forEach(d=>{

const card=document.createElement("div")
card.className="card"
card.textContent=d.aux

card.onclick=()=>{

totalQuestion++

if(d.aux===current.aux){

score++
totalCorrect++

document.getElementById("info").innerHTML=
"⭕ "+current.aux+"："+current.meaning

}else{

wrongCount[current.aux]++

document.getElementById("info").innerHTML=
"❌ 正解："+current.aux+" "+current.meaning

}

setTimeout(nextQuestion,1500)

}

cardsDiv.appendChild(card)

})

}

function showResult(){

localStorage.setItem("kobunWrong",JSON.stringify(wrongCount))
localStorage.setItem("kobunCorrect",totalCorrect)
localStorage.setItem("kobunQuestion",totalQuestion)

let rate=Math.round(totalCorrect/totalQuestion*100)

document.getElementById("cards").innerHTML=""

document.getElementById("result").innerHTML=

"今回："+score+"/10<br>"+
"累計正答率："+rate+"%"

}

function showDictionary(){

let html="<h3>助動詞図鑑</h3><table>"
html+="<tr><th>助動詞</th><th>意味</th><th>接続</th></tr>"

data.forEach(d=>{

html+="<tr><td>"+d.aux+"</td><td>"+d.meaning+"</td><td>"+d.connect+"</td></tr>"

})

html+="</table>"

document.getElementById("dictionary").innerHTML=html

}

function resetData(){

localStorage.clear()
alert("記録をリセットしました")

}

</script>

</body>
</html>
