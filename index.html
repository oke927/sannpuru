<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>超釣りゲーム</title>

<style>

body{
font-family:sans-serif;
text-align:center;
margin:0;
background:linear-gradient(#6ec6ff,#1976d2);
color:white;
}

#ocean{
position:relative;
height:350px;
overflow:hidden;
background:linear-gradient(#4fc3f7,#01579b);
}

.fish{
position:absolute;
font-size:40px;
cursor:pointer;
animation:swim linear forwards;
}

@keyframes swim{
0%{left:-50px}
100%{left:110%}
}

button{
font-size:16px;
padding:8px 20px;
margin:5px;
border:none;
border-radius:10px;
background:orange;
color:white;
}

#dex{
display:none;
background:white;
color:black;
margin:10px;
padding:10px;
border-radius:10px;
max-height:250px;
overflow:auto;
}

</style>
</head>

<body>

<h1>🎣超釣りゲーム</h1>

<div id="ocean"></div>

<div id="result">魚をタップして釣ろう！</div>
<div id="score"></div>
<div id="rod"></div>

<button onclick="upgradeRod()">釣り竿強化</button>
<button onclick="toggleDex()">図鑑</button>

<div id="dex">
<h3>📖魚図鑑</h3>
<div id="dexList"></div>
</div>

<script>

let score = Number(localStorage.getItem("score")) || 0
let rod = Number(localStorage.getItem("rod")) || 1
let caught = JSON.parse(localStorage.getItem("caught")) || {}

const fishes = [

{name:"小魚",emoji:"🐟",point:1,rarity:1},
{name:"イワシ",emoji:"🐟",point:1,rarity:1},
{name:"サバ",emoji:"🐟",point:2,rarity:1},

{name:"タイ",emoji:"🐠",point:3,rarity:2},
{name:"フグ",emoji:"🐡",point:4,rarity:2},
{name:"イカ",emoji:"🦑",point:4,rarity:2},

{name:"タコ",emoji:"🐙",point:5,rarity:3},
{name:"エビ",emoji:"🦐",point:5,rarity:3},
{name:"カニ",emoji:"🦀",point:6,rarity:3},

{name:"クラゲ",emoji:"🪼",point:6,rarity:4},
{name:"カメ",emoji:"🐢",point:8,rarity:4},
{name:"イルカ",emoji:"🐬",point:10,rarity:4},

{name:"クジラ",emoji:"🐋",point:15,rarity:5},
{name:"サメ",emoji:"🦈",point:20,rarity:5},
{name:"伝説の魚",emoji:"🐉",point:50,rarity:5}

]

updateUI()
updateDex()

function spawnFish(){

let ocean=document.getElementById("ocean")

let available=fishes.filter(f=>f.rarity<=rod+1)

let fishData=available[Math.floor(Math.random()*available.length)]

let fish=document.createElement("div")
fish.className="fish"
fish.innerText=fishData.emoji

fish.style.top=Math.random()*300+"px"
fish.style.animationDuration=(4+Math.random()*4)+"s"

fish.onclick=function(){

score+=fishData.point

document.getElementById("result").innerText=
fishData.name+" を釣った！ "+ "★".repeat(fishData.rarity)

caught[fishData.name]=true

save()
updateUI()
updateDex()

fish.remove()

}

ocean.appendChild(fish)

setTimeout(()=>fish.remove(),8000)

}

setInterval(spawnFish,1200)

function upgradeRod(){

let cost=rod*50

if(score>=cost){

score-=cost
rod++

alert("釣り竿Lv"+rod+"になった！")

save()
updateUI()

}else{

alert("ポイント不足")

}

}

function toggleDex(){

let d=document.getElementById("dex")

d.style.display = d.style.display=="none" ? "block":"none"

}

function updateUI(){

document.getElementById("score").innerText="ポイント:"+score
document.getElementById("rod").innerText="釣り竿Lv:"+rod

}

function updateDex(){

let list=document.getElementById("dexList")
list.innerHTML=""

fishes.forEach(f=>{

let div=document.createElement("div")

if(caught[f.name]){
div.innerText=f.emoji+" "+f.name+" "+"★".repeat(f.rarity)
}else{
div.innerText="？？？"
}

list.appendChild(div)

})

}

function save(){

localStorage.setItem("score",score)
localStorage.setItem("rod",rod)
localStorage.setItem("caught",JSON.stringify(caught))

}

</script>

</body>
</html>
